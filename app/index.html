<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>BC Crown Land</title>
    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <!-- Boot overlay: part of the initial HTML so it paints instantly (no black
         screen while the app initialises). main.ts removes it once content
         renders, or replaces it with an error + Retry if boot fails. -->
    <div id="boot" class="boot">
      <div class="boot-inner">
        <div class="boot-spinner" aria-hidden="true"></div>
        <div class="boot-title">BC Crown Land</div>
        <div class="boot-sub">Loading…</div>
      </div>
    </div>

    <div id="map"></div>

    <!-- Top-right control stack -->
    <div id="controls" class="control-stack">
      <button id="btn-locate" class="ctrl-btn" title="Locate me" aria-label="Locate me">◎</button>
      <button id="btn-compass" class="ctrl-btn" title="Reset north" aria-label="Reset bearing to north">
        <span class="compass-needle">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <polygon points="12,2.5 8,13 12,10.8 16,13" fill="#d9534f" />
            <polygon points="12,21.5 8,11 12,13.2 16,11" fill="#9fb0c0" />
          </svg>
        </span>
      </button>
      <button id="btn-search" class="ctrl-btn" title="Search coordinates" aria-label="Search coordinates">⌕</button>
      <button id="btn-pins" class="ctrl-btn" title="Saved pins" aria-label="Saved pins">⚑</button>
      <button id="btn-layers" class="ctrl-btn" title="Layers" aria-label="Layers">▤</button>
      <button id="btn-info" class="ctrl-btn" title="Info & attribution" aria-label="Info">ⓘ</button>
    </div>

    <!-- Coordinate readout (bottom-left) -->
    <div id="coord-readout" class="coord-readout" hidden></div>

    <!-- Panels / sheets are created dynamically by the UI modules -->
    <div id="ui-root"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
